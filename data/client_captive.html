<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ESP32 Device Settings</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 1.5rem;
            max-width: 360px;
            width: 100%;
        }

        h1 {
            font-size: 1.3rem;
            text-align: center;
        }

        .mac {
            background: #eee;
            padding: 0.6rem 1rem;
            border-radius: 0.5rem;
            font-family: monospace;
            text-align: center;
            margin: 0.5rem 0 1rem;
            word-break: break-all;
        }

        button {
            background: #0078ff;
            color: white;
            border: none;
            border-radius: 0.5rem;
            padding: 0.6rem 1rem;
            font-size: 1rem;
            cursor: pointer;
        }

        button:active {
            background: #005fcc;
        }

        label,
        select {
            display: block;
            width: 100%;
            margin: 0.5rem 0;
            font-size: 1rem;
        }

        select {
            padding: 0.4rem;
            border-radius: 0.4rem;
            border: 1px solid #ccc;
            background: white;
        }

        .actions {
            display: flex;
            gap: 0.5rem;
            justify-content: space-between;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>ESP32 Device</h1>
        <div class="mac" id="mac">--:--:--:--:--:--</div>
        <div class="actions">
            <button id="copyBtn">Copy</button>
        </div>
        <label for="channel">MIDI Channel:</label>
        <select id="channel">
            <script>
                for (let i = 1; i <= 16; i++) {
                    document.write(`<option value="${i}">${i}</option>`);
                }
            </script>
        </select>
        <div class="actions">
            <button id="saveBtn">Save</button>
        </div>
    </div>

    <script>
        // Example: you can inject the MAC address dynamically from ESP32 server
        document.getElementById('mac').textContent = "50:78:7D:47:1D:48";

        document.getElementById('copyBtn').onclick = () => {
            const mac = document.getElementById('mac').textContent;
            navigator.clipboard.writeText(mac);
            alert("MAC copied!");
        };

        document.getElementById('saveBtn').onclick = async () => {
            const ch = document.getElementById('channel').value;
            await fetch(`/set_channel?ch=${ch}`);
            alert("Channel saved!");
        };
    </script>
</body>

</html>
