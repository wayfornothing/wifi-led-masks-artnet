<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Device Configuration</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --accent: #0077cc;
            --danger: #cc0000;
            --border: #ddd;
            --radius: 10px;
        }

        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            background: var(--bg);
            color: #333;
            padding: 1rem;
        }

        h2,
        h3 {
            text-align: center;
            margin-bottom: 1rem;
        }

        .card {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: var(--radius);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 0.5rem;
            margin-top: 0.25rem;
            margin-bottom: 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
            box-sizing: border-box;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #005fa3;
        }

        .btn-danger {
            background: var(--danger);
        }

        .btn-danger:hover {
            background: #990000;
        }

        .led-block {
            border: 1px solid var(--border);
            padding: 0.5rem;
            border-radius: var(--radius);
            margin-bottom: 1rem;
            background: #fafafa;
        }

        .toggle-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            flex-shrink: 0;
            margin-left: 0.5rem;
        }

        .toggle-btn:hover {
            background: #005fa3;
        }

        .led-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
            padding: 0.25rem 0;
        }

        .led-title {
            flex-grow: 1;
        }

        .led-content {
            display: none;
        }

        .led-block.expanded .led-content {
            display: block;
        }

        .warning {
            color: var(--danger);
            font-size: 0.9rem;
            display: none;
            margin-top: -0.5rem;
            margin-bottom: 0.5rem;
        }

        .led-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .name-pin-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1rem;
        }

        .mac-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .mac-text {
            font-weight: bold;
        }

        .copy-btn {
            width: auto;
            padding: 0.4rem 0.75rem;
            border-radius: var(--radius);
        }

        @media (min-width: 600px) {
            .form-grid {
                display: grid;
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }
    </style>
</head>

<body>
    <h2>Device Configuration</h2>

    <div class="card">
        <div class="mac-container">
            <span class="mac-text">MAC Address: <span id="mac-address">__MAC_ADDRESS__</span></span>
            <button class="copy-btn" onclick="copyMAC()">📋 Copy</button>
        </div>
        <div class="form-grid">
            <label>MIDI Channel
                <select id="channel"></select>
            </label>
        </div>
    </div>

    <div class="card">
        <h3>LED Configuration</h3>
        <div id="leds"></div>
        <button onclick="addLED()">➕ Add LED</button>
    </div>

    <div style="text-align:center">
        <button id="saveBtn" onclick="saveConfig()">💾 Save</button>
    </div>

    <script>
        let ledCounter = 0;
        const pins = ["D0", "D1", "D2", "D3", "D4", "D5", "D6", "D7", "D8", "D9", "D10"];

        function addLED(initial = {}) {
            ledCounter++;
            const div = document.createElement("div");
            div.className = "led-block expanded";

            const name = initial.name || ("LED" + ledCounter);

            div.innerHTML = `
        <div class="led-header">
          <span class="led-title">${name}</span>
          <button type="button" class="toggle-btn">-</button>
        </div>
        <div class="led-content">
          <div class="name-pin-row">
            <label>Name
              <input type="text" class="led-name" value="${name}">
            </label>
            <label>Pin
              <select class="led-pin">
                ${pins.map(p => `<option ${initial.pin === p ? "selected" : (p === "D1" ? "selected" : "")}>${p}</option>`).join("")}
              </select>
            </label>
          </div>
          <div class="warning">⚠ D0 is not FADE compatible</div>
          <div class="led-actions">
            <button onclick="testLED(this,'blink')">Blink</button>
            <button onclick="testLED(this,'enable')">Enable</button>
            <button onclick="testLED(this,'random')">Random</button>
            <button onclick="testLED(this,'fade')">Fade</button>
            <button onclick="testLED(this,'heartbeat')">Heartbeat</button>
            <button onclick="testLED(this,'pulse')">Pulse</button>
            <button class="btn-danger" onclick="removeLED(this)">❌ Remove</button>
          </div>
        </div>
      `;

            const toggleBtn = div.querySelector(".toggle-btn");
            toggleBtn.addEventListener("click", () => {
                div.classList.toggle("expanded");
                toggleBtn.textContent = div.classList.contains("expanded") ? "-" : "+";
            });

            const nameInput = div.querySelector(".led-name");
            const titleSpan = div.querySelector(".led-title");
            nameInput.addEventListener("input", () => {
                titleSpan.textContent = nameInput.value;
            });

            div.querySelector(".led-pin").addEventListener("change", function () {
                const warn = div.querySelector(".warning");
                warn.style.display = (this.value === "D0") ? "block" : "none";
            });

            document.getElementById("leds").appendChild(div);
        }

        function removeLED(btn) {
            btn.closest(".led-block").remove();
        }

        function getLEDConfig(div) {
            return {
                name: div.querySelector(".led-name").value,
                pin: div.querySelector(".led-pin").value,
            };
        }

        function testLED(btn, mode) {
            const div = btn.closest(".led-block");
            const led = getLEDConfig(div);
            fetch("/test", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ ...led, mode })
            });
        }

        function saveConfig() {
            const leds = [...document.querySelectorAll(".led-block")].map(getLEDConfig);
            const config = {
                channel: parseInt(document.getElementById("channel").value),
                leds: leds
            };

            fetch("/save", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(config)
            }).then(() => alert("Config saved"));
        }

        function copyMAC() {
            const mac = document.getElementById("mac-address").textContent.trim();
            navigator.clipboard.writeText(mac).then(() => {
                alert("MAC address copied: " + mac);
            });
        }

        window.onload = () => {
            // Populate MIDI channel dropdown
            const channelSelect = document.getElementById("channel");
            channelSelect.innerHTML = "";
            for (let i = 1; i <= 16; i++) {
                const opt = document.createElement("option");
                opt.value = i;
                opt.textContent = i;
                channelSelect.appendChild(opt);
            }

            // Try to load existing config.json
            fetch("/config.json")
                .then(r => {
                    if (!r.ok) {
                        throw new Error("No config.json found");
                    }
                    return r.json();
                })
                .then(cfg => {
                    console.log("Loaded config:", cfg);
                    if (cfg.channel !== undefined) {
                        document.getElementById("channel").value = cfg.channel;
                    }
                    document.getElementById("leds").innerHTML = "";
                    ledCounter = 0;
                    if (cfg.leds && cfg.leds.length > 0) {
                        cfg.leds.forEach(led => addLED(led));
                    }
                })
                .catch(() => {
                    console.log("No existing config.json — starting fresh.");
                });
        };
    </script>
</body>

</html>
