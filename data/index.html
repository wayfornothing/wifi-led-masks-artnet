<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ESP8266 Configuration</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --accent: #0077cc;
            --danger: #cc0000;
            --border: #ddd;
            --radius: 10px;
        }

        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            background: var(--bg);
            color: #333;
            padding: 1rem;
        }

        h2,
        h3 {
            text-align: center;
            margin-bottom: 1rem;
        }

        .card {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: var(--radius);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 0.5rem;
            margin-top: 0.25rem;
            margin-bottom: 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
            box-sizing: border-box;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #005fa3;
        }

        .btn-danger {
            background: var(--danger);
        }

        .btn-danger:hover {
            background: #990000;
        }

        .led-block {
            border: 1px solid var(--border);
            padding: 0.5rem;
            border-radius: var(--radius);
            margin-bottom: 1rem;
            background: #fafafa;
        }

        .toggle-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            flex-shrink: 0;
            margin-left: 0.5rem;
        }

        .toggle-btn:hover {
            background: #005fa3;
        }

        .led-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
            padding: 0.25rem 0;
        }

        .led-title {
            flex-grow: 1;
        }

        .led-content {
            display: none;
        }

        .led-block.expanded .led-content {
            display: block;
        }

        .warning {
            color: var(--danger);
            font-size: 0.9rem;
            display: none;
            margin-top: -0.5rem;
            margin-bottom: 0.5rem;
        }

        .led-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        @media (min-width: 600px) {
            .form-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 1rem;
            }
        }
    </style>
</head>

<body>
    <h2>ESP8266 Configuration</h2>

    <div class="card">
        <h3>ArtNet</h3>
        <div class="form-grid">
            <label>Universe
                <input type="number" id="universe" min="0" value="0">
            </label>
            <label>Channel
                <input type="number" id="channel" min="1" value="1">
            </label>
        </div>
    </div>

    <div class="card">
        <h3>LEDs</h3>
        <div id="leds"></div>
        <button onclick="addLED()">➕ Add LED</button>
    </div>

    <div style="text-align:center">
        <button id="saveBtn" onclick="saveConfig()">💾 Save</button>
    </div>

    <script>
        let ledCounter = 0;
        const pins = ["D0", "D1", "D2", "D3", "D4", "D5", "D6", "D7", "D8", "D9", "D10"];

        function addLED(initial = {}) {
            ledCounter++;
            const div = document.createElement("div");
            div.className = "led-block expanded";

            const name = initial.name || ("LED" + ledCounter);

            div.innerHTML = `
        <div class="led-header">
          <span class="led-title">${name}</span>
          <button type="button" class="toggle-btn">-</button>
        </div>
        <div class="led-content">
          <label>Name
            <input type="text" class="led-name" value="${name}">
          </label>
          <label>Pin
            <select class="led-pin">
              ${pins.map(p => `<option ${initial.pin === p ? "selected" : (p === "D1" ? "selected" : "")}>${p}</option>`).join("")}
            </select>
          </label>
          <div class="warning">⚠ D0 is not FADE compatible</div>
          <label>Blink Interval (ms)
            <input type="number" class="blink-int" value="${initial.blink_interval || 50}">
          </label>
          <label>Random Interval (ms)
            <input type="number" class="rand-int" value="${initial.random_interval || 100}">
          </label>
          <label>Fade Interval (ms)
            <input type="number" class="fade-int" value="${initial.fade_interval || 2}">
          </label>
          <div class="led-actions">
            <button onclick="testLED(this,'blink')">Blink</button>
            <button onclick="testLED(this,'enable')">Enable</button>
            <button onclick="testLED(this,'random')">Random</button>
            <button onclick="testLED(this,'fade')">Fade</button>
            <button class="btn-danger" onclick="removeLED(this)">❌ Remove</button>
          </div>
        </div>
      `;

            // Expand/collapse toggle
            const toggleBtn = div.querySelector(".toggle-btn");
            toggleBtn.addEventListener("click", () => {
                div.classList.toggle("expanded");
                toggleBtn.textContent = div.classList.contains("expanded") ? "-" : "+";
            });

            // Update header title live when name changes
            const nameInput = div.querySelector(".led-name");
            const titleSpan = div.querySelector(".led-title");
            nameInput.addEventListener("input", () => {
                titleSpan.textContent = nameInput.value;
            });

            // Warn for D0
            div.querySelector(".led-pin").addEventListener("change", function () {
                const warn = div.querySelector(".warning");
                warn.style.display = (this.value === "D0") ? "block" : "none";
            });

            document.getElementById("leds").appendChild(div);
        }

        function removeLED(btn) {
            btn.closest(".led-block").remove();
        }

        function getLEDConfig(div) {
            return {
                name: div.querySelector(".led-name").value, // description
                pin: div.querySelector(".led-pin").value, // WARNING this is the pin NAME, not integer value !!!
                blink_interval: parseInt(div.querySelector(".blink-int").value),
                random_interval: parseInt(div.querySelector(".rand-int").value),
                fade_interval: parseInt(div.querySelector(".fade-int").value)
            };
        }

        function testLED(btn, mode) {
            const div = btn.closest(".led-block");
            const led = getLEDConfig(div);
            fetch("/test", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ ...led, mode })
            });
        }

        function saveConfig() {
            const leds = [...document.querySelectorAll(".led-block")].map(getLEDConfig);
            const config = {
                universe: parseInt(document.getElementById("universe").value),
                channel: parseInt(document.getElementById("channel").value),
                leds: leds
            };

            fetch("/save", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(config)
            }).then(() => alert("Config saved"));
        }

        window.onload = () => {
            fetch("/leds.json")
                .then(r => r.json())
                .then(cfg => {
                    if (cfg.universe !== undefined) document.getElementById("universe").value = cfg.universe;
                    if (cfg.channel !== undefined) document.getElementById("channel").value = cfg.channel;

                    document.getElementById("leds").innerHTML = "";
                    ledCounter = 0;
                    if (cfg.leds && cfg.leds.length > 0) {
                        cfg.leds.forEach(led => addLED(led));
                    }
                })
                .catch(err => {
                    console.error("Failed to load /leds.json", err);
                });
        };
    </script>
</body>

</html>
