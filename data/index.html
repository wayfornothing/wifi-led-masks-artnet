<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ESP8266 Configuration</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --accent: #0077cc;
            --danger: #cc0000;
            --border: #ddd;
            --radius: 10px;
        }

        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            background: var(--bg);
            color: #333;
            padding: 1rem;
        }

        h2,
        h3 {
            text-align: center;
            margin-bottom: 1rem;
        }

        .card {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: var(--radius);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 0.5rem;
            margin-top: 0.25rem;
            margin-bottom: 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
            box-sizing: border-box;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #005fa3;
        }

        .btn-danger {
            background: var(--danger);
        }

        .btn-danger:hover {
            background: #990000;
        }

        .led-block {
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1rem;
            background: #fafafa;
        }

        .warning {
            color: var(--danger);
            font-size: 0.9rem;
            display: none;
            margin-top: -0.5rem;
            margin-bottom: 0.5rem;
        }

        .led-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        @media (min-width: 600px) {
            .form-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 1rem;
            }
        }
    </style>
</head>

<body>
    <h2>ESP8266 Configuration</h2>

    <!-- <div class="card">
        <h3>Network</h3>
        <label>Hostname
            <input type="text" id="hostname">
        </label>
        <label>WiFi SSID
            <input type="text" id="ssid">
        </label>
        <label>WiFi Password
            <input type="password" id="password">
        </label>
    </div> -->

    <div class="card">
        <h3>ArtNet</h3>
        <div class="form-grid">
            <label>Universe
                <input type="number" id="universe" min="0" value="0">
            </label>
            <label>Channel
                <input type="number" id="channel" min="1" value="1">
            </label>
        </div>
    </div>

    <div class="card">
        <h3>LEDs</h3>
        <div id="leds"></div>
        <button onclick="addLED()">➕ Add LED</button>
    </div>

    <div style="text-align:center">
        <button id="saveBtn" onclick="saveConfig()">💾 Save</button>
    </div>

    <script>
        let ledCounter = 0;
        const pins = ["D0", "D1", "D2", "D3", "D4", "D5", "D6", "D7", "D8", "D9", "D10"];

        function updateSaveButton() {
            const hasLEDs = document.querySelectorAll(".led-block").length > 0;
            console.log("updateSaveButton: hasLEDs =", hasLEDs);
            document.getElementById("saveBtn").disabled = !hasLEDs;
        }

        function addLED(initial = {}) {
            ledCounter++;
            console.log("addLED: adding LED #", ledCounter, "initial =", initial);

            const div = document.createElement("div");
            div.className = "led-block";

            div.innerHTML = `
        <label>Name
            <input type="text" class="led-name" value="${initial.name || "LED" + ledCounter}">
        </label>
        <label>Pin
            <select class="led-pin">
                ${pins.map(p => {
                const selected = (initial.pin ? initial.pin === p : p === "D1") ? "selected" : "";
                return `<option ${selected}>${p}</option>`;
            }).join("")}
            </select>
        </label>
        <div class="warning">⚠ D0 is not FADE compatible</div>
        <label>Blink Interval (ms)
            <input type="number" class="blink-int" value="${initial.blink_interval || 50}">
        </label>
        <label>Random Interval (ms)
            <input type="number" class="rand-int" value="${initial.random_interval || 100}">
        </label>
        <label>Fade Interval (ms)
            <input type="number" class="fade-int" value="${initial.fade_interval || 2}">
        </label>
        <div class="led-actions">
            <button onclick="testLED(this,'blink')">Blink</button>
            <button onclick="testLED(this,'enable')">Enable</button>
            <button onclick="testLED(this,'random')">Random</button>
            <button onclick="testLED(this,'fade')">Fade</button>
            <button class="btn-danger" onclick="removeLED(this)">❌ Remove</button>
        </div>
    `;

            div.querySelector(".led-pin").addEventListener("change", function () {
                const warn = div.querySelector(".warning");
                warn.style.display = (this.value === "D0") ? "block" : "none";
                console.log("LED pin changed to", this.value);
            });

            document.getElementById("leds").appendChild(div);
            console.log("LED block appended to DOM");
            updateSaveButton();
        }

        function removeLED(btn) {
            console.log("removeLED called");
            btn.closest(".led-block").remove();
            updateSaveButton();
        }

        function getLEDConfig(div) {
            const config = {
                name: div.querySelector(".led-name").value,
                pin: div.querySelector(".led-pin").value,
                blink_interval: parseInt(div.querySelector(".blink-int").value),
                random_interval: parseInt(div.querySelector(".rand-int").value),
                fade_interval: parseInt(div.querySelector(".fade-int").value)
            };
            console.log("getLEDConfig:", config);
            return config;
        }

        function testLED(btn, mode) {
            const div = btn.closest(".led-block");
            const led = getLEDConfig(div);
            console.log("testLED mode:", mode, "led:", led);
            fetch("/test", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ ...led, mode })
            });
        }

        function saveConfig() {
            const leds = [...document.querySelectorAll(".led-block")].map(getLEDConfig);
            const config = {
                universe: parseInt(document.getElementById("universe").value),
                channel: parseInt(document.getElementById("channel").value),
                leds: leds
            };
            console.log("saveConfig: saving config", config);

            fetch("/save", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(config)
            }).then(() => console.log("Config saved"));
        }

        window.onload = () => {
            console.log("window.onload: fetching /leds.json");
            fetch("/leds.json")
                .then(r => {
                    console.log("Fetch response:", r);
                    return r.text();
                })
                .then(text => {
                    console.log("Raw leds.json text:", text);
                    let cfg;
                    try {
                        cfg = JSON.parse(text);
                        console.log("Parsed JSON:", cfg);
                    } catch (e) {
                        console.error("Failed to parse leds.json:", e);
                        cfg = {};
                    }

                    document.getElementById("universe").value = cfg.universe ?? 0;
                    document.getElementById("channel").value = cfg.channel ?? 1;

                    document.getElementById("leds").innerHTML = "";
                    ledCounter = 0;

                    if (cfg.leds && Array.isArray(cfg.leds) && cfg.leds.length > 0) {
                        console.log("Creating LED blocks for", cfg.leds.length, "LED(s)");
                        cfg.leds.forEach((led, idx) => {
                            console.log("Adding LED index", idx, led);
                            addLED(led);
                        });
                    } else {
                        console.log("No LEDs found in JSON, not adding default block");
                    }

                    updateSaveButton();
                })
                .catch(err => {
                    console.error("Failed to fetch /leds.json:", err);
                    document.getElementById("leds").innerHTML = "";
                    ledCounter = 0;
                    updateSaveButton();
                });
        };
    </script>



</body>

</html>
