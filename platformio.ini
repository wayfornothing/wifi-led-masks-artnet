; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[common]
framework = arduino
lib_deps =
    bblanchon/ArduinoJson @ ^6.21.0
    https://github.com/rstephan/ArtnetWifi.git
    olikraus/U8g2@^2.36.12
    ; zeed/ESP Async WebServer@^1.2.3
monitor_speed = 115200
upload_speed = 460800
extra_scripts = pre:scripts/prebuild_step.py
platform = espressif8266
board = esp12e ; compatible w/ "esp-12f doithing"

[env:espnow_gateway]
extends = common
platform = espressif32
board = adafruit_qtpy_esp32c3
upload_speed = 115200
build_src_filter = +<espnow/gateway.cpp>
upload_port = /dev/tty.usbmodem1201
monitor_port = /dev/tty.usbmodem1201
build_flags = -std=gnu++17
build_unflags = -std=gnu++11

[env:espnow_olivier]
extends = common
build_src_filter = +<espnow/client.cpp>
upload_port = /dev/tty.usbserial-1440
monitor_port = /dev/tty.usbserial-1440

[env:espnow_usbc]
extends = common
build_src_filter = +<espnow/client.cpp>
upload_port = /dev/tty.usbserial-A5069RR4
monitor_port = /dev/tty.usbserial-A5069RR4

