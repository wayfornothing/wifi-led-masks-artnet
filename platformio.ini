; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[common]
platform = espressif8266
board = esp12e ; compatible w/ "esp-12f doithing"
framework = arduino
lib_deps =
    bblanchon/ArduinoJson @ ^6.21.0
upload_speed = 115200
extra_scripts = pre:scripts/gen_version.py

[env:olivier]
extends = common
; build_flags = 
;     -D DEVICE_OLIVIER

[env:yann]
extends = common
build_flags = 
    -D DEVICE_YANN

[env:bertrand]
extends = common
build_flags = 
    -D DEVICE_BERTRAND


[env:maxime]
extends = common
build_flags = 
    -D DEVICE_MAXIME


[env:jerome]
extends = common
build_flags = 
    -D DEVICE_JEROME

[env:david]
extends = common
build_flags = 
    -D DEVICE_DAVID
